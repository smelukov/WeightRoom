<svg xmlns="http://www.w3.org/2000/svg" width="240" height="20" role="img" aria-label="WeightRoom: LLM Hardware Calculator">
  <title>WeightRoom: LLM Hardware Calculator</title>
  <linearGradient id="b" x2="0" y2="100%">
    <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
    <stop offset="1" stop-opacity=".1"/>
  </linearGradient>
  <clipPath id="a"><rect width="240" height="20" rx="3" fill="#fff"/></clipPath>
  <g clip-path="url(#a)">
