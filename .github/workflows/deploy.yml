name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Allow manual re-deploys from the Actions tab.
  workflow_dispatch:

# Pages deployment requires these scopes; everything else stays read-only.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once. We DON'T cancel an in-flight deploy mid-way
# (a half-published Pages site is worse than a slightly stale one).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Project Pages live at https://<user>.github.io/<repo>/, so all
          # asset URLs must be prefixed with the repo name. Switch to "/" if
          # you ever attach a custom apex domain via Settings → Pages.
          VITE_BASE: /WeightRoom/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
