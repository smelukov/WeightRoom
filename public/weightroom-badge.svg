  </g>
  <g text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-size="11">
    <text x="39" y="14" fill="#1a1a1a">WeightRoom</text>
    <text x="159" y="15" fill="#010101" fill-opacity="0.3">LLM Hardware Calculator</text>
    <text x="159" y="14" fill="#ffffff">LLM Hardware Calculator</text>
